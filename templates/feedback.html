<h2>Votre retour sur la session</h2>
<form method="post" style="max-inline-size: 400px;">
  <label><strong>Qualité sonore :</strong></label><br>
  <select name="sound_quality" required>
    <option>Très bonne</option>
    <option>Bonne</option>
    <option>Moyenne</option>
    <option>Mauvaise</option>
  </select><br><br>

  <label><strong>Confort de l’environnement :</strong></label><br>
  <select name="environment_comfort" required>
    <option>Confortable</option>
    <option>Acceptable</option>
    <option>Inconfortable</option>
  </select><br><br>

  <label><strong>Niveau d’attention ressenti (1-10) :</strong></label><br>
  <input type="number" name="attention_level" min="1" max="10" required><br><br>

  <label><strong>Commentaires :</strong></label><br>
  <textarea name="comment" rows="4" cols="40"></textarea><br><br>

  <button type="submit">Envoyer</button>
</form>
